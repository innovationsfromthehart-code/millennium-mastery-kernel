<!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Innovations from the Hart LLC</title>
        <style>
            body {
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                margin: 0;
                padding: 0;
                background-color: #000000; /* Vanta Black */
                color: #c0c0c0; /* Silver/Nickel */
                display: flex;
                flex-direction: column;
                min-height: 100vh;
            }
            header {
                padding: 20px 40px;
                text-align: center;
                border-bottom: 1px solid #444;
            }
            header h1 {
                margin: 0;
                font-size: 1.8em;
                font-weight: 300;
                color: #e0e0e0;
            }
            .hero {
                flex-grow: 1;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                text-align: center;
                padding: 40px;
            }
            .hero h2 {
                font-size: 3em;
                margin-bottom: 20px;
                font-weight: 500;
                color: #f0f0f0;
            }
            .hero p {
                font-size: 1.5em;
                margin-bottom: 30px;
                font-weight: 300;
                color: #d0d0d0;
            }
            .agents {
                padding: 30px 40px;
                text-align: center;
                background-color: #0a0a0a;
                border-top: 1px solid #444;
                border-bottom: 1px solid #444;
            }
            .agents h3 {
                font-size: 2em;
                margin-bottom: 25px;
                font-weight: 400;
                color: #e0e0e0;
            }
            .agents ul {
                list-style: none;
                padding: 0;
                margin: 0;
                display: flex;
                justify-content: space-around;
                flex-wrap: wrap;
            }
            .agents li {
                font-size: 1.2em;
                margin: 10px;
                padding: 10px 20px;
                border: 1px solid #333;
                border-radius: 5px;
                background-color: #111;
                color: #c0c0c0;
            }
            footer {
                padding: 20px 40px;
                text-align: center;
                font-size: 0.9em;
                border-top: 1px solid #444;
                background-color: #050505;
                color: #888;
            }
        </style>
    </head>
    <body>
        <header>
            <h1>Innovations from the Hart LLC</h1>
        </header>
        <section class="hero">
            <h2>1000yr Millennium Mastery</h2>
            <p>Sovereign Swarm Execution</p>
        </section>
        <section class="agents">
            <h3>Core Agents</h3>
            <ul>
                <li>Chancellor</li>
                <li>Forge Master</li>
                <li>Revenue Architect</li>
                <li>Artisan</li>
            </ul>
        </section>
        <footer>
            <p>CAGE: 17CR1 | UEI: V6B2FVW9QCK9</p>
        </footer>
    </body>
    </html>
