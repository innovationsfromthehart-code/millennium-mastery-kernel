<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nature Photography Gallery</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }
        h1 {
            color: #333;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 10px;
            width: 100%;
            max-width: 1200px;
        }
        .gallery img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>
    <h1>Nature Photography Gallery</h1>
    <div class="gallery">
        <img src="https://example.com/nature1.jpg" alt="Nature Photo 1">
        <img src="https://example.com/nature2.jpg" alt="Nature Photo 2">
        <img src="https://example.com/nature3.jpg" alt="Nature Photo 3">
        <img src="https://example.com/nature4.jpg" alt="Nature Photo 4">
        <img src="https://example.com/nature5.jpg" alt="Nature Photo 5">
    </div>
</body>
</html>
